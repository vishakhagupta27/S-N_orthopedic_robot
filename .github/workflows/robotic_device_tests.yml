name: Robotic Injection Device Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/Robotic_Injection_Device/**'
      - '.github/workflows/robotic_device_tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/Robotic_Injection_Device/**'
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libgtest-dev \
            libeigen3-dev \
            libhdf5-dev \
            libopencv-dev \
            lcov \
            gcovr

      - name: Setup compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

      - name: Configure CMake
        working-directory: apps/Robotic_Injection_Device/tests
        run: |
          mkdir -p build
          cd build
          cmake -G Ninja \
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -DCMAKE_CXX_FLAGS="--coverage" \
                ..

      - name: Build tests
        working-directory: apps/Robotic_Injection_Device/tests/build
        run: ninja -j$(nproc)

      - name: Run unit tests
        working-directory: apps/Robotic_Injection_Device/tests/build
        run: |
          ctest --output-on-failure --timeout 300

      - name: Generate coverage report (Debug only)
        if: matrix.build_type == 'Debug' && matrix.compiler == 'gcc'
        working-directory: apps/Robotic_Injection_Device/tests/build
        run: |
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/test/*' '*/mocks/*' \
               --output-file coverage_filtered.info
          lcov --list coverage_filtered.info

      - name: Upload coverage to Codecov
        if: matrix.build_type == 'Debug' && matrix.compiler == 'gcc'
        uses: codecov/codecov-action@v3
        with:
          files: apps/Robotic_Injection_Device/tests/build/coverage_filtered.info
          flags: unittests
          name: robotic-device-coverage
          fail_ci_if_error: false

      - name: Generate HTML coverage report
        if: matrix.build_type == 'Debug' && matrix.compiler == 'gcc'
        working-directory: apps/Robotic_Injection_Device/tests/build
        run: |
          genhtml coverage_filtered.info --output-directory coverage_html

      - name: Upload coverage HTML
        if: matrix.build_type == 'Debug' && matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: apps/Robotic_Injection_Device/tests/build/coverage_html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            apps/Robotic_Injection_Device/tests/build/Testing/
            apps/Robotic_Injection_Device/tests/build/*.xml

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgtest-dev libeigen3-dev

      - name: Build benchmarks
        working-directory: apps/Robotic_Injection_Device/tests
        run: |
          mkdir -p build
          cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          ninja

      - name: Run performance tests
        working-directory: apps/Robotic_Injection_Device/tests/build
        run: |
          ./test_integration --gtest_filter=*Performance*

  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --inconclusive --xml --xml-version=2 \
                   apps/Robotic_Injection_Device/ \
                   2> cppcheck-report.xml || true

      - name: Upload cppcheck results
        uses: actions/upload-artifact@v3
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, quality-checks]
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3

      - name: Generate summary
        run: |
          echo "# Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Tests completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage reports available in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test results available in artifacts" >> $GITHUB_STEP_SUMMARY
